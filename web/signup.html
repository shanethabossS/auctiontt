<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuctionTT | Sign Up</title>
  <meta name="description" content="Create your AuctionTT account to bid, watch listings, and sell across Trinidad and Tobago." />
  <meta property="og:title" content="AuctionTT | Sign Up" />
  <meta property="og:description" content="Join AuctionTT as a buyer or seller and access local listings." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./index.html">AuctionTT</a>
    <nav>
      <a href="./index.html">Home</a>
      <a href="./categories.html">Categories</a>
      <a href="./sell.html">Sell</a>
      <a href="./feedback.html">Feedback</a>
      <a data-auth-pill href="./signin.html" class="active">Sign In</a>
      <button data-logout class="btn ghost btn-sm" style="display:none">Logout</button>
    </nav>
    <button class="nav-hamburger" id="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </header>
  <div class="nav-mobile" id="nav-mobile">
    <a href="./index.html">Home</a>
    <a href="./categories.html">Categories</a>
    <a href="./sell.html">Sell</a>
    <a href="./feedback.html">Feedback</a>
    <div class="nav-mobile-divider"></div>
    <a data-auth-pill-mobile href="./signin.html">Sign In</a>
    <button data-logout-mobile class="btn ghost" style="display:none">Logout</button>
  </div>

  <main class="page-main" style="max-width: 620px;">
    <section class="card">
      <h2>Create Account</h2>
      <div class="stack-form" style="margin-bottom:12px">
        <button id="google-signup-btn" class="btn google-auth-btn" type="button">
          <span class="google-icon" aria-hidden="true">G</span>
          <span>Continue with Google</span>
        </button>
      </div>
      <p class="auth-divider">or create account with email</p>
      <form id="signup-form" class="stack-form">
        <input name="full_name" type="text" placeholder="Full name" required />
        <input name="email" type="email" placeholder="Email" required />
        <input name="phone" type="tel" placeholder="Phone number" />
        <input name="password" type="password" placeholder="Password (min 8 chars)" minlength="8" required />
        <input name="confirm_password" type="password" placeholder="Confirm password" minlength="8" required />
        <select name="role">
          <option value="buyer">Buyer</option>
          <option value="seller">Seller</option>
        </select>
        <button class="btn" type="submit">Create Account</button>
      </form>
      <p class="subtle auth-switch">Already have an account? <a href="./signin.html">Sign in</a></p>
    </section>

    <p id="auth-message" class="subtle"></p>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/signup.js"></script>
</body>
</html>
