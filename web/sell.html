<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealzTT | Sell</title>
  <meta name="description" content="Sell items on DealzTT with verified local profiles. Use clearly labeled demo data for launch QA." />
  <meta property="og:title" content="DealzTT | Seller Portal" />
  <meta property="og:description" content="Create your seller profile and submit local Trinidad and Tobago auction listings on DealzTT." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Public+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./index.html">DealzTT</a>
    <nav>
      <a href="./index.html">Home</a>
      <a href="./categories.html">Categories</a>
      <a href="./sell.html" class="active">Sell</a>
      <a href="./feedback.html">Feedback</a>
      <a data-auth-pill href="./signin.html">Sign In</a>
      <button data-logout class="btn ghost btn-sm" style="display:none">Logout</button>
    </nav>
    <button class="nav-hamburger" id="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </header>
  <div class="nav-mobile" id="nav-mobile">
    <a href="./index.html">Home</a>
    <a href="./categories.html">Categories</a>
    <a href="./sell.html">Sell</a>
    <a href="./feedback.html">Feedback</a>
    <div class="nav-mobile-divider"></div>
    <a data-auth-pill-mobile href="./signin.html">Sign In</a>
    <button data-logout-mobile class="btn ghost" style="display:none">Logout</button>
  </div>

  <main class="page-main">
    <section class="page-intro">
      <h1>Seller Portal</h1>
      <p id="seller-user" class="subtle"></p>
      <p id="profile-state" class="subtle"></p>
      <p id="sell-status" class="subtle"></p>
    </section>

    <section class="split-grid">
      <article class="card">
        <h2>Seller Profile</h2>
        <form id="seller-profile-form" class="stack-form">
          <input name="business_name" type="text" placeholder="Business name" required />
          <input name="phone" type="text" placeholder="Phone" />
          <input name="city" type="text" placeholder="Town or City" />
          <input name="state" type="text" placeholder="Region (Trinidad/Tobago)" />
          <textarea name="about" placeholder="About your DealzTT seller profile"></textarea>
          <button class="btn" type="submit">Save Profile</button>
        </form>
      </article>

      <article class="card">
        <h2>Upload Item</h2>
        <form id="item-upload-form" class="stack-form">
          <select id="item-category" required></select>
          <input name="title" type="text" placeholder="Item title (use [DEMO] for sample data)" required />
          <textarea name="description" placeholder="Description" required></textarea>
          <div class="inline-fields">
            <input name="starting_bid" type="number" min="1" step="1" placeholder="Starting bid" required />
            <input name="reserve_price" type="number" min="0" step="1" placeholder="Reserve price" />
            <input name="quantity" type="number" min="1" step="1" value="1" required />
          </div>
          <input name="image_file" type="file" accept="image/*" />
          <p class="subtle">Upload a photo to auto-compress to WebP for faster loading.</p>
          <input name="image_url" type="url" placeholder="Image URL" />
          <div class="inline-fields">
            <input name="city" type="text" placeholder="Town or City" />
            <input name="state" type="text" placeholder="Region (Trinidad/Tobago)" />
          </div>
          <label class="check-row"><input name="shipping_available" type="checkbox" /> Shipping Available</label>
          <label class="check-row"><input name="pickup_available" type="checkbox" checked /> Pickup Available</label>
          <button class="btn" type="submit">Submit Item</button>
        </form>
      </article>
    </section>

    <section class="card">
      <h2>Recent Submissions</h2>
      <ul id="recent-submissions" class="plain-list"></ul>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/sell.js"></script>
</body>
</html>
