services:
  auctionsite_postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: auctionsite
      POSTGRES_USER: auction_admin
      POSTGRES_PASSWORD: auction_admin_pass
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - auctionsite_postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction_admin -d auctionsite"]
      interval: 5s
      timeout: 5s
      retries: 20

  auctionsite_postgrest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      auctionsite_postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator_pass@auctionsite_postgres:5432/auctionsite
      PGRST_DB_SCHEMA: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_JWT_SECRET: dev-only-secret-change-me
      PGRST_SERVER_PORT: 3000
      PGRST_OPENAPI_SERVER_PROXY_URI: http://142.93.14.0:33001
    ports:
      - "0.0.0.0:33001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  auctionsite_postgres_data:
